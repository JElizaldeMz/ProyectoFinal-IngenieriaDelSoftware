{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block titulo %}{{ titulo }} — Admin{% endblock %}
{% block header %}{{ titulo }}{% endblock %}

{% block estilos %}
<style>
    main { display: flex; justify-content: center; padding: 2rem 1rem 4rem; }
    .auth-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 2.5rem; max-width: 580px; width: 100%; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
    .auth-card label { color: rgba(255,255,255,0.75); font-size: 0.85rem; }
    .auth-card .form-control, .auth-card select, .auth-card textarea { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 8px; }
    .auth-card .form-control:focus { background: rgba(255,255,255,0.12); border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.2); color: #fff; }
    .auth-card select option { background: #302b63; }
    .auth-card .helptext, .auth-card small { color: rgba(255,255,255,0.3) !important; font-size: 0.78rem; }
    .btn-guardar { width: 100%; padding: 0.7rem; background: linear-gradient(135deg, #10b981, #059669); border: none; border-radius: 8px; color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 0.5rem; }
    .btn-guardar:hover { opacity: 0.9; }
    .btn-volver { display: inline-block; margin-top: 1rem; color: rgba(255,255,255,0.4); font-size: 0.85rem; text-decoration: none; }
    .btn-volver:hover { color: #fff; }
</style>
{% endblock %}

{% block contenido %}
<div class="auth-card">
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn-guardar">{{ accion }}</button>
    </form>
    <a href="{% url 'parques:lista_admin' %}" class="btn-volver">← Volver a la lista</a>
</div>
{% endblock %}
