{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block titulo %}{{ titulo }} — Admin{% endblock %}
{% block header %}{{ titulo }}{% endblock %}

{% block estilos %}
<style>
    main { display: flex; justify-content: center; padding: 1.5rem 1rem 4rem; }
    .form-wrap { max-width: 560px; width: 100%; }
    .form-wrap .organic-card { padding: 2.5rem; }
</style>
{% endblock %}

{% block contenido %}
<div class="form-wrap">
    <div class="organic-card">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn-primary-organic" style="margin-top:1.5rem;">{{ accion }}</button>
        </form>
        <a href="{% url 'parques:lista_admin' %}" class="btn-back">← Volver a la lista</a>
    </div>
</div>
{% endblock %}
